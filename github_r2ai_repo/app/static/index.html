<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>R2AI Law RAG</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f5;
        color: #202124;
      }
      body {
        margin: 0;
      }
      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 28px 20px 48px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid #d8d8d2;
        padding-bottom: 16px;
      }
      h1 {
        font-size: 24px;
        margin: 0;
        font-weight: 700;
      }
      .status {
        font-size: 13px;
        color: #5f6368;
      }
      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
        gap: 20px;
        margin-top: 24px;
      }
      section {
        min-width: 0;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 650;
        margin-bottom: 8px;
      }
      textarea {
        width: 100%;
        min-height: 190px;
        box-sizing: border-box;
        resize: vertical;
        border: 1px solid #c7c7bf;
        border-radius: 6px;
        padding: 12px;
        font: inherit;
        line-height: 1.45;
        background: #fff;
      }
      button {
        margin-top: 12px;
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        background: #1f6feb;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        background: #8aa8d8;
        cursor: wait;
      }
      pre {
        min-height: 360px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid #d8d8d2;
        border-radius: 6px;
        padding: 14px;
        background: #fff;
        line-height: 1.45;
      }
      @media (max-width: 860px) {
        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>R2AI Law RAG</h1>
        <div class="status" id="status">Checking service...</div>
      </header>
      <div class="workspace">
        <section>
          <label for="question">Cau hoi</label>
          <textarea id="question" placeholder="Nhap cau hoi phap luat..."></textarea>
          <button id="submit" type="button">Tra loi</button>
        </section>
        <section>
          <label for="result">Ket qua</label>
          <pre id="result"></pre>
        </section>
      </div>
    </main>
    <script>
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const questionEl = document.getElementById("question");
      const submitEl = document.getElementById("submit");

      async function refreshHealth() {
        try {
          const res = await fetch("/health");
          const data = await res.json();
          statusEl.textContent = data.data.results_exists ? "Ready" : "Missing data/results.json";
        } catch (err) {
          statusEl.textContent = "Service unavailable";
        }
      }

      async function answer() {
        submitEl.disabled = true;
        resultEl.textContent = "Dang xu ly...";
        try {
          const res = await fetch("/api/answer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: questionEl.value, top_k: 5 }),
          });
          const data = await res.json();
          resultEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          resultEl.textContent = String(err);
        } finally {
          submitEl.disabled = false;
        }
      }

      submitEl.addEventListener("click", answer);
      refreshHealth();
    </script>
  </body>
</html>
